name: Daily AI News Email

# 22:00 UTC = 5:00 PM CDT (US Central, DST active). When DST ends in
# November, this will fire at 4:00 PM CST until DST resumes in March —
# bump cron to "0 23 * * *" if you want 5:00 PM year-round during CST.
# GitHub Actions cron has no timezone support and can drift 5-15 min under load.
# Also fires on push to main (so code fixes auto-trigger an email) and
# manual workflow_dispatch from the Actions tab.
on:
  schedule:
    - cron: "0 22 * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily-email.yml"
      - "scripts/send_daily_email.py"
      - "aisignal/**"
      - "reports/**"
      - "__main__.py"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout into AI_news/ subdir
        uses: actions/checkout@v4
        with:
          path: AI_news

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: AI_news
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize DB and ingest reports
        run: |
          python -m AI_news init-db
          python -m AI_news ingest-dir AI_news/reports

      - name: Build weekly brief
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID || '1' }}
        run: |
          python -m AI_news export-project "$PROJECT_ID"

      - name: Send brief via Gmail
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PROJECT_ID: ${{ secrets.PROJECT_ID || '1' }}
        run: |
          python AI_news/scripts/send_daily_email.py
