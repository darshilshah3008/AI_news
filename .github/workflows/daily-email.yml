name: Daily AI News Email

# 01:30 UTC = 07:00 IST. GitHub Actions cron can drift 5-15 min under load.
# Manual trigger is also enabled via workflow_dispatch.
on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout into AI_news/ subdir
        uses: actions/checkout@v4
        with:
          path: AI_news

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: AI_news
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize DB and ingest reports
        run: |
          python -m AI_news init-db
          python -m AI_news ingest-dir AI_news/reports

      - name: Build weekly brief
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID || '1' }}
        run: |
          python -m AI_news export-project "$PROJECT_ID"

      - name: Send brief via Gmail
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PROJECT_ID: ${{ secrets.PROJECT_ID || '1' }}
        run: |
          python AI_news/scripts/send_daily_email.py
